AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS SAM Baseline – Node.js runtime with Lambda Layers architecture

Parameters:
  ProjectName:
    Type: String
    Default: myapp
    Description: Base name for all resources

  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment (dev, staging, prod)

  CorsOrigin:
    Type: String
    Default: "*"
    Description: CORS origin for API Gateway

  #Throttling configuration per environment

  BurstLimit:
    Type: Number
    Default: 1000
    Description: API Gateway burst limit (requests per second)
    MinValue: 1
    MaxValue: 10000
  RateLimit:
    Type: Number
    Default: 500
    Description: API Gateway rate limit (requests per second)
    MinValue: 1
    MaxValue: 10000

  #Provision concurrency configuration
  ProvisionedConcurrency:
    Type: Number
    Default: 0
    Description: Number of provisoned concurrency instances for the live aliases (0 = disabled)
    MinValue: 0
    MaxValue: 1000

Mappings:
  EnvConfig:
    dev:
      LogLevel: INFO
      SenderEmail: noreply@dev.example.com
      BurstLimit: 1000
      RateLimit: 500
    staging:
      LogLevel: INFO
      SenderEmail: noreply@staging.example.com
      BurstLimit: 1000
      RateLimit: 500
    prod:
      LogLevel: WARN
      SenderEmail: noreply@example.com
      BurstLimit: 250
      RateLimit: 100

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        ENV: !Ref EnvironmentName
        LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
        NODE_OPTIONS: "--enable-source-maps"

        # ===== SHARED SECRETS =====
        MONGO_URI: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:MONGO_URI}}"
        JWT_SECRET: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:JWT_SECRET}}"
        RAZORPAY_KEY_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:RAZORPAY_KEY_ID}}"
        RAZORPAY_KEY_SECRET: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:RAZORPAY_KEY_SECRET}}"
        GOOGLE_SERVICE_ACCOUNT_JSON: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:GOOGLE_SERVICE_ACCOUNT_JSON}}"
        AWS_COGNITO_APP_CLIENT_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:AWS_COGNITO_APP_CLIENT_ID}}"
        AWS_COGNITO_IDENTITY_POOL_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:AWS_COGNITO_IDENTITY_POOL_ID}}"
        AWS_COGNITO_USER_POOL_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:AWS_COGNITO_USER_POOL_ID}}"
        AWS_JWKS_URI: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:AWS_JWKS_URI}}"
        SECRET_KEY_AES: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/backend:SecretString:SECRET_KEY_AES}}"
        BLOG_AWS_S3_BUCKET_NAME: REPLACE_ME_S3_BUCKET
        FITNEARN_AWS_REGION: REPLACE_ME_REGION
        ENCRYPTED_BUCKET_NAME: REPLACE_ME_ENCRYPTED_BUCKET
        USER_IMAGE_BUCKET: REPLACE_ME_USER_IMAGE_BUCKET
    # Apply both layers to ALL functions globally
    Layers:
      - !Ref CommonDependenciesLayer
      - !Ref SharedUtilsLayer

#*************
Resources:
  #************
  # ===================================
  # Lambda Layer: Common npm packages
  # ===================================
  CommonDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${ProjectName}-common-deps-${EnvironmentName}"
      Description: Common npm dependencies (updated)
      ContentUri: layers/common/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: makefile
      BuildArchitecture: x86_64

  # ===================================
  # Lambda Layer: Shared TypeScript utilities
  # ===================================
  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${ProjectName}-shared-utils-${EnvironmentName}"
      Description: Compiled shared TypeScript utilities (updated)
      ContentUri: src/shared/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: makefile
      BuildArchitecture: x86_64

  # ===================================
  # S3 Bucket for application data (uploads, exports, reports)
  # ===================================
  ApplicationBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-assets-${EnvironmentName}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ===================================
  # IAM Role for Lambda Functions
  # ===================================
  MyAppLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-LambdaRole-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-LambdaPolicy-${EnvironmentName}"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

              # Secrets Manager - MongoDB URI
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/backend*"

              # Parameter Store - Cognito credentials
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/myapp/${EnvironmentName}/auth/*"

              # Cognito - For health checks
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:ListUserPools
                Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"

              # SES - Send emails
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

              # s3 - Application bucket access
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: "*"

              #SNS - Publish to app events topic
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AppEventsTopic

              # SQS - Processing Queue
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                Resource:
                  - !GetAtt ProcessingQueue.Arn
                  - !GetAtt ProcessingDLQ.Arn

              # SQS - Workflow FIFO Queue
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                Resource:
                  - !GetAtt WorkflowQueue.Arn
                  - !GetAtt WorkflowDLQ.Arn
              # EventBridge - Publish to custom bus
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt AppEventBus.Arn
  # ===================================
  # Lambda Functions
  # ===================================
  PingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-ping-${EnvironmentName}"
      CodeUri: src/functions/ping
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 512
      # AutoPublishAlias: live
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]

          # MongoDB
          MONGODB_SECRET_ID: !Sub "${ProjectName}/${EnvironmentName}/backend"

          # Cognito
          COGNITO_CLIENT_ID_PATH: !Sub "/myapp/${EnvironmentName}/auth/clientId"
          COGNITO_CLIENT_SECRET_PATH: !Sub "/myapp/${EnvironmentName}/auth/clientSecret"
          COGNITO_USER_POOL_ID: !Ref MyAppUserPool

          # S3
          S3_APPLICATION_BUCKET: !Ref ApplicationBucket

      Events:
        PingApi:
          Type: Api
          Properties:
            RestApiId: !Ref MyAppApi
            Path: /ping
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - "@aws-sdk/*"
          - "@common/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios

  #--------------------
  WelcomeEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-welcome-email-${EnvironmentName}"
      CodeUri: src/functions/email/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30
      # AutoPublishAlias: live
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
          FROM_EMAIL: !FindInMap [EnvConfig, !Ref EnvironmentName, SenderEmail]
          # S3 Buckets
          S3_APPLICATION_BUCKET: !Ref ApplicationBucket
      Events:
        WelcomeEmailApi:
          Type: Api
          Properties:
            Path: /welcome-email
            Method: POST
            RestApiId: !Ref MyAppApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - shared
          - "@aws-sdk/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios

  #---------------------------
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-auth-${EnvironmentName}"
      CodeUri: src/functions/auth/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30
      # AutoPublishAlias: live
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
          # MongoDB
          MONGODB_SECRET_ID: !Sub "${ProjectName}/${EnvironmentName}/backend"
          # Cognito
          COGNITO_CLIENT_ID_PATH: !Sub "/myapp/${EnvironmentName}/auth/clientId"
          COGNITO_CLIENT_SECRET_PATH: !Sub "/myapp/${EnvironmentName}/auth/clientSecret"
          COGNITO_USER_POOL_ID: !Ref MyAppUserPool
          # SES
          FROM_EMAIL: !FindInMap [EnvConfig, !Ref EnvironmentName, SenderEmail]
          # S3 Buckets
          S3_APPLICATION_BUCKET: !Ref ApplicationBucket
      Events:
        RegisterApi:
          Type: Api
          Properties:
            Path: /register
            Method: POST
            RestApiId: !Ref MyAppApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - shared
          - "@aws-sdk/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios

  #------------------------
  SNSSubscriberFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-sns-subscriber-${EnvironmentName}"
      CodeUri: src/functions/sns-subscriber/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30
      # AutoPublishAlias: live
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - shared
          - "@aws-sdk/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios

  #-----------------------
  SQSConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-sqs-consumer-${EnvironmentName}"
      CodeUri: src/functions/sqs-consumers/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
      # No API event — triggered by SQS only
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - shared
          - "@aws-sdk/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios
  #--------------------
  EventBusPublisherFunction:
    Type: AWS::Serverless::Function
    Properties:
      Role: !GetAtt MyAppLambdaRole.Arn
      FunctionName: !Sub "${ProjectName}-event-bus-publisher-${EnvironmentName}"
      CodeUri: src/functions/event-bus-publisher/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 10
      Environment:
        Variables:
          ENV: !Ref EnvironmentName
          LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
          EVENT_BUS_NAME: !Ref AppEventBus
      Events:
        PublishTestEventApi:
          Type: Api
          Properties:
            Path: /publish-test-event
            Method: POST
            RestApiId: !Ref MyAppApi
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@/*"
          - shared
          - "@aws-sdk/*"
          - "@fit-earn-meditate/*"
          - mongoose
          - moment
          - moment-timezone
          - multer
          - firebase-admin
          - razorpay
          - jsonwebtoken
          - jwks-rsa
          - axios

  # ===================================
  # Cognito User Pool
  # ===================================
  MyAppUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-users-${EnvironmentName}"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: false
      AutoVerifiedAttributes:
        - email
      AliasAttributes:
        - email
      MfaConfiguration: "OFF"
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: given_name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: family_name
          AttributeDataType: String
          Mutable: true
          Required: true

  # ===================================
  # Cognito User Pool Client
  # ===================================
  MyAppUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-app-${EnvironmentName}"
      UserPoolId: !Ref MyAppUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
  # ===================================
  # API Gateway Configuration
  # ===================================

  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/api-gateway/${ProjectName}-${EnvironmentName}-access-logs"
      RetentionInDays: 14

  MyAppApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref EnvironmentName
      BinaryMediaTypes:
        - multipart/form-data
        - image/png
        - image/jpeg
        - application/octet-stream
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS,PATCH'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          MetricsEnabled: true
          ThrottlingBurstLimit:
            !FindInMap [EnvConfig, !Ref EnvironmentName, BurstLimit]
          ThrottlingRateLimit:
            !FindInMap [EnvConfig, !Ref EnvironmentName, RateLimit]
