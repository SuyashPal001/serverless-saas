  # ==============
  # KMS Resource
  # ==============
  SNSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "CMK for encrypting SNS messages in ${ProjectName} (${EnvironmentName})"
      Enabled: true
      EnableKeyRotation: true
      PendingWindowInDays: 30
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: Allow SNS to use the key
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey"
            Resource: "*"

  SNSEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${EnvironmentName}-sns-key"
      TargetKeyId: !Ref SNSEncryptionKey

  # ==============
  # SNS Topic
  # ==============
  AppEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-${EnvironmentName}-events"
      KmsMasterKeyId: !Ref SNSEncryptionKey

  SNSPublishPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-${EnvironmentName}-SNSPublishPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "sns:Publish"
            Resource: !Ref AppEventsTopic

  # ==============
  # SNS Subscriptions
  # ==============
  LambdaSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      Endpoint: !GetAtt SNSSubscriberFunction.Arn
      TopicArn: !Ref AppEventsTopic

  SNSSubscriberPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SNSSubscriberFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AppEventsTopic

  SQSSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt AppEventsQueue.Arn
      TopicArn: !Ref AppEventsTopic
      RawMessageDelivery: true
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 1
          maxDelayTarget: 30
          numRetries: 3
          numNoDelayRetries: 0
          backoffFunction: "exponential"

  # ==============
  # SQS Subscriber + DLQ
  # ==============
  AppEventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-events-dlq"

  AppEventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-events-queue"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AppEventsDLQ.Arn
        maxReceiveCount: 3

  AppEventsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AppEventsQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: SQS:SendMessage
            Resource: !GetAtt AppEventsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref AppEventsTopic

  # ===================================
  # Async Processing Queue (Standard)
  # ===================================
  ProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-processing-dlq"

  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-processing"
      VisibilityTimeout: 30
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessingDLQ.Arn
        maxReceiveCount: 3

  # ===================================
  # Ordered Workflow Queue (FIFO)
  # ===================================
  WorkflowDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-workflow-dlq.fifo"
      FifoQueue: true

  WorkflowQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${EnvironmentName}-workflow.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 60
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WorkflowDLQ.Arn
        maxReceiveCount: 5

  ProcessingQueueEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 10
      Enabled: true
      EventSourceArn: !GetAtt ProcessingQueue.Arn
      FunctionName: !GetAtt SQSConsumerFunction.Arn

  WorkflowQueueEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 1 # FIFO requires BatchSize=1 for ordering
      Enabled: true
      EventSourceArn: !GetAtt WorkflowQueue.Arn
      FunctionName: !GetAtt SQSConsumerFunction.Arn

  # ===================================
  # CloudWatch Alarms for Queue Backlogs
  # ===================================
  ProcessingQueueBacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${EnvironmentName}-ProcessingQueue-Backlog"
      AlarmDescription: "Alarm when ProcessingQueue has too many visible messages"
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300 # 5 minutes
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ProcessingQueue.QueueName
      TreatMissingData: notBreaching

  WorkflowQueueBacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${EnvironmentName}-WorkflowQueue-Backlog"
      AlarmDescription: "Alarm when WorkflowQueue has too many visible messages"
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50 # lower for FIFO (ordered workflows are more time-sensitive)
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WorkflowQueue.QueueName
      TreatMissingData: notBreaching

  # ===================================
  # Event Bridge
  # ===================================
  AppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${ProjectName}-${EnvironmentName}-bus"
Outputs:
  # Layer ARNs
  CommonDependenciesLayerArn:
    Description: "ARN of Common Dependencies Layer"
    Value: !Ref CommonDependenciesLayer
    Export:
      Name: !Sub "${AWS::StackName}-CommonDepsLayerArn"

  SharedUtilsLayerArn:
    Description: "ARN of Shared Utils Layer"
    Value: !Ref SharedUtilsLayer
    Export:
      Name: !Sub "${AWS::StackName}-SharedUtilsLayerArn"

  # S3 Bucket Outputs
  ArtifactsBucketName:
    Description: "S3 bucket for application data"
    Value: !Ref ApplicationBucket
    Export:
      Name: !Sub "${AWS::StackName}-ApplicationBucketName"

  ApplicationBucketArn:
    Description: "S3 bucket ARN for application data"
    Value: !GetAtt ApplicationBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ApplicationBucketArn"

  # Function outputs
  PingFunctionName:
    Description: "Ping Lambda function name"
    Value: !Ref PingFunction

  PingApiUrl:
    Description: "API Gateway endpoint URL for ping function"
    Value: !Sub "https://${MyAppApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/ping"
    Export:
      Name: !Sub "${AWS::StackName}-PingUrl"

  # Cognito outputs
  UserPoolId:
    Description: "Cognito user pool id"
    Value: !Ref MyAppUserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolClientId:
    Description: "Cognito App Client ID"
    Value: !Ref MyAppUserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"

  UserPoolClientSecret:
    Description: "Cognito App Client Secret"
    Value: !GetAtt MyAppUserPoolClient.ClientSecret
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientSecret"
