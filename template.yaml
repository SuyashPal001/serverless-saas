AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  serverless-saas Foundation — Lambda definitions only.
  All infrastructure (API Gateway, Cognito, SQS, SNS, EventBridge, IAM)
  is owned by Terraform. SAM reads values Terraform writes to SSM.

Parameters:
  ProjectName:
    Type: String
    Default: serverless-saas

  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  FoundationApiRoleArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /serverless-saas/dev/iam/foundation-api-role-arn

  FoundationWorkerRoleArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /serverless-saas/dev/iam/foundation-worker-role-arn

  FoundationPretokenRoleArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /serverless-saas/dev/iam/foundation-pretoken-role-arn

  FoundationWebSocketRoleArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /serverless-saas/dev/iam/foundation-websocket-role-arn

  TaskWorkerRoleArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /serverless-saas/dev/iam/task-worker-role-arn

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 29
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        PROJECT: !Ref ProjectName

Resources:

  # ─────────────────────────────────────────────
  # API Lambda — Hono HTTP handler (Lambdalith)
  # ─────────────────────────────────────────────
  FoundationApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-api-${EnvironmentName}"
      Description: Foundation API — Hono HTTP handler
      CodeUri: apps/api/
      Handler: index.handler
      Role: !Ref FoundationApiRoleArn
      Environment:
        Variables:
          LAMBDA_TYPE: api
          COGNITO_USER_POOL_ID: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/cognito/user-pool-id}}"
          COGNITO_CLIENT_ID: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/cognito/client-id}}"
          COGNITO_JWKS_URI: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/cognito/jwks-uri}}"
          SQS_PROCESSING_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/processing-queue-url}}"
          SNS_EVENTS_TOPIC_ARN: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sns/events-topic-arn}}"
          EVENTBRIDGE_BUS_NAME: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/eventbridge/bus-name}}"
          DATABASE_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/database:SecretString:url}}"
          UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
          FROM_EMAIL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/ses/from-email}}"
          UPSTASH_REDIS_TOKEN_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/cache"
          OPENCLAW_WS_ENDPOINT: "wss://agent-saas.fitnearn.com"
          DOCUMENTS_BUCKET: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/s3/documents-bucket-name}}"
          GCP_SA_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/gcp-sa-key"
          GCP_LOCATION: "us-central1"
          GOOGLE_CLIENT_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/google-oauth:SecretString:client_id}}"
          GOOGLE_CLIENT_SECRET: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/google-oauth:SecretString:client_secret}}"
          GOOGLE_REDIRECT_URI: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/google-redirect-uri}}"
          ZOHO_CLIENT_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/zoho-oauth:SecretString:client_id}}"
          ZOHO_CLIENT_SECRET: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/zoho-oauth:SecretString:client_secret}}"
          ZOHO_REDIRECT_URI: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/zoho-redirect-uri}}"
          JIRA_CLIENT_ID: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/jira-oauth:SecretString:client_id}}"
          JIRA_CLIENT_SECRET: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/jira-oauth:SecretString:client_secret}}"
          JIRA_REDIRECT_URI: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/jira-redirect-uri}}"
          TOKEN_ENCRYPTION_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/token-encryption-key"
          FRONTEND_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/frontend-url}}"
          RELAY_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/relay-url}}"
          INTERNAL_SERVICE_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/internal-service-key"
          AGENT_TASK_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/agent-task-queue-url}}"
    Metadata:
      BuildMethod: makefile

  # ─────────────────────────────────────────────
  # Worker Lambda — SQS consumer
  # ─────────────────────────────────────────────
  FoundationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-worker-${EnvironmentName}"
      Description: Foundation Worker — SQS consumer for background jobs
      CodeUri: apps/worker/
      Handler: lambda.handler
      Timeout: 300
      Role: !Ref FoundationWorkerRoleArn
      Environment:
        Variables:
          LAMBDA_TYPE: worker
          DATABASE_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/database:SecretString:url}}"
          UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
          UPSTASH_REDIS_TOKEN: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:token}}"
          GCP_SA_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/gcp-sa-key"
          GCP_LOCATION: "us-central1"
          DOCUMENTS_BUCKET: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/s3/documents-bucket-name}}"
    Metadata:
      BuildMethod: makefile

  # ─────────────────────────────────────────────
  # Pre Token Generation Lambda — stamps JWT claims
  # ─────────────────────────────────────────────
  FoundationPretokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-pretoken-${EnvironmentName}"
      Description: Cognito Pre Token Generation — stamps tenantId, role, plan into JWT
      CodeUri: apps/api/
      Handler: pretoken.handler
      Timeout: 5
      MemorySize: 256
      Role: !Ref FoundationPretokenRoleArn
      Environment:
        Variables:
          LAMBDA_TYPE: pretoken
          DATABASE_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/database:SecretString:url}}"
          UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
          UPSTASH_REDIS_TOKEN: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:token}}"
          OPENCLAW_WS_ENDPOINT: "wss://agent-saas.fitnearn.com"
    Metadata:
      BuildMethod: makefile

# ─────────────────────────────────────────────
  # WebSocket Lambda — handles $connect, $disconnect, $default
  # ─────────────────────────────────────────────
  FoundationWebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-websocket-${EnvironmentName}"
      Description: Foundation WebSocket — connection management
      CodeUri: apps/api/
      Handler: websocket.handler
      Timeout: 29
      MemorySize: 256
      Role: !Ref FoundationWebSocketRoleArn
      Environment:
        Variables:
          LAMBDA_TYPE: websocket
          UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
          UPSTASH_REDIS_TOKEN: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:token}}"
          WS_TOKEN_SECRET_SSM_PATH: !Sub "/${ProjectName}/${EnvironmentName}/ws-token-secret"
          OPENCLAW_WS_ENDPOINT: "wss://agent-saas.fitnearn.com"
    Metadata:
      BuildMethod: makefile

  # ─────────────────────────────────────────────
  # Task Worker Lambda — async planning/execution
  # ─────────────────────────────────────────────
  TaskWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-task-worker-${EnvironmentName}"
      Description: Task Worker — async agent task planning via SQS
      CodeUri: apps/api/
      Handler: taskWorker.handler
      Timeout: 300
      MemorySize: 512
      Role: !Ref TaskWorkerRoleArn
      Environment:
        Variables:
          LAMBDA_TYPE: task-worker
          DATABASE_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/database:SecretString:url}}"
          RELAY_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/relay-url}}"
          INTERNAL_SERVICE_KEY_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${EnvironmentName}/internal-service-key"
          UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
          UPSTASH_REDIS_TOKEN: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:token}}"
    Metadata:
      BuildMethod: makefile

Outputs:
  FoundationApiLambdaArn:
    Value: !GetAtt FoundationApiFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationApiLambdaArn"

  FoundationWorkerLambdaArn:
    Value: !GetAtt FoundationWorkerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationWorkerLambdaArn"

  FoundationPretokenLambdaArn:
    Value: !GetAtt FoundationPretokenFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationPretokenLambdaArn"

  FoundationWebSocketLambdaArn:
    Value: !GetAtt FoundationWebSocketFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationWebSocketLambdaArn"

  TaskWorkerLambdaArn:
    Value: !GetAtt TaskWorkerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TaskWorkerLambdaArn"
