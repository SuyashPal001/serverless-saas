AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  serverless-saas Foundation — Lambda function definitions only.
  All infrastructure (API Gateway, Cognito, SQS, SNS, EventBridge, IAM)
  is owned by Terraform. This template reads values Terraform writes to SSM.

Parameters:
  ProjectName:
    Type: String
    Default: serverless-saas

  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Mappings:
  EnvConfig:
    dev:
      LogLevel: INFO
    staging:
      LogLevel: INFO
    prod:
      LogLevel: WARN

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    MemorySize: 512
    Timeout: 29
    Environment:
      Variables:
        NODE_ENV: !Ref EnvironmentName
        LOG_LEVEL: !FindInMap [EnvConfig, !Ref EnvironmentName, LogLevel]
        NODE_OPTIONS: "--enable-source-maps"
        COGNITO_USER_POOL_ID: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/cognito/user-pool-id}}"
        COGNITO_CLIENT_ID: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/cognito/client-id}}"
        DATABASE_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/database:SecretString:url}}"
        UPSTASH_REDIS_URL: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:url}}"
        UPSTASH_REDIS_TOKEN: !Sub "{{resolve:secretsmanager:${ProjectName}/${EnvironmentName}/cache:SecretString:token}}"

Resources:

  FoundationApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-api-${EnvironmentName}"
      Description: Hono HTTP handler for all foundation API routes
      CodeUri: apps/api/
      Handler: index.handler
      MemorySize: 512
      Timeout: 29
      Role: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/iam/foundation-api-role-arn}}"
      Environment:
        Variables:
          LAMBDA_TYPE: api
          PROCESSING_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/processing-queue-url}}"
          WORKFLOW_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/workflow-queue-url}}"
          EVENTS_TOPIC_ARN: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sns/events-topic-arn}}"
          EVENT_BUS_NAME: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/eventbridge/bus-name}}"
    Metadata:
      BuildMethod: makefile

  FoundationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-worker-${EnvironmentName}"
      Description: SQS consumer for all foundation background jobs
      CodeUri: apps/worker/
      Handler: lambda.handler
      MemorySize: 1024
      Timeout: 900
      Role: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/iam/foundation-worker-role-arn}}"
      Environment:
        Variables:
          LAMBDA_TYPE: worker
          PROCESSING_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/processing-queue-url}}"
          WORKFLOW_QUEUE_URL: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sqs/workflow-queue-url}}"
          EVENTS_TOPIC_ARN: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/sns/events-topic-arn}}"
          EVENT_BUS_NAME: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/eventbridge/bus-name}}"
    Metadata:
      BuildMethod: makefile

  FoundationPretokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-foundation-pretoken-${EnvironmentName}"
      Description: Cognito Pre Token Generation — stamps tenantId, role, plan into JWT
      CodeUri: apps/api/
      Handler: pretoken.handler
      MemorySize: 256
      Timeout: 5
      Role: !Sub "{{resolve:ssm:/${ProjectName}/${EnvironmentName}/iam/foundation-pretoken-role-arn}}"
      Environment:
        Variables:
          LAMBDA_TYPE: pretoken
    Metadata:
      BuildMethod: makefile

Outputs:
  FoundationApiLambdaArn:
    Description: Foundation API Lambda ARN
    Value: !GetAtt FoundationApiFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationApiLambdaArn"

  FoundationWorkerLambdaArn:
    Description: Foundation Worker Lambda ARN
    Value: !GetAtt FoundationWorkerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationWorkerLambdaArn"

  FoundationPretokenLambdaArn:
    Description: Foundation Pre Token Lambda ARN
    Value: !GetAtt FoundationPretokenFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FoundationPretokenLambdaArn"
